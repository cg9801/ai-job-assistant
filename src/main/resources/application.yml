server:
  port: 8080

spring:
  application:
    name: ai-job-assistant

  # ===== 数据库配置 =====
  datasource:
    url: jdbc:h2:mem:jobassistant
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  # ===== Spring AI 配置 =====
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-api-key-here}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-4o
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-3-small

    # 向量数据库配置
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536

# ===== 应用自定义配置 =====
app:
  ai:
    # RAG 检索返回的相似文档数量
    top-k: 5
    # 相似度阈值（低于此值的文档不返回）
    similarity-threshold: 0.7

  # 文件上传限制
  upload:
    max-size: 10MB
    allowed-types: pdf,docx,txt,md
